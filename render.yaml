# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Talko has two services:
#   1. talko-api  — Express API server (image upload proxy + welcome conversation)
#   2. talko-app  — React/Vite static frontend
#
# Deploy steps:
#   1. Push this repo to GitHub (already done).
#   2. Go to https://render.com/dashboard → New → Blueprint → connect the repo.
#   3. Render will discover this file and create both services automatically.
#   4. Fill in the secret env vars in each service's dashboard (marked sync: false below).
#   5. After talko-api is live, copy its URL into talko-app's VITE_API_URL env var,
#      then trigger a manual re-deploy of talko-app.

services:
  # ── API Server ─────────────────────────────────────────────────────────────
  - type: web
    name: talko-api
    runtime: node
    plan: free
    buildCommand: "npm install pnpm@9 --no-save && ./node_modules/.bin/pnpm install --frozen-lockfile && ./node_modules/.bin/pnpm --filter @workspace/api-server run build"
    startCommand: "./node_modules/.bin/pnpm --filter @workspace/api-server run start"
    envVars:
      - key: NODE_ENV
        value: production
      # Required secrets — set these manually in the Render dashboard:
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false   # full service-account JSON (from Firebase Console → Project settings → Service accounts)
      - key: IMGBB_API_KEY
        sync: false   # from https://api.imgbb.com
      - key: SESSION_SECRET
        sync: false   # any long random string

  # ── Frontend (static site) ──────────────────────────────────────────────────
  - type: web
    name: talko-app
    runtime: static
    plan: free
    buildCommand: "npm install pnpm@9 --no-save && ./node_modules/.bin/pnpm install --frozen-lockfile && ./node_modules/.bin/pnpm --filter @workspace/talko run build"
    staticPublishPath: ./artifacts/talko/dist/public
    # SPA fallback — all routes serve index.html so client-side routing works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: BASE_PATH
        value: /
      # Firebase public config — get these from Firebase Console → Project settings → Your apps
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      # Set this to the talko-api service URL AFTER it's deployed, e.g.:
      # https://talko-api.onrender.com
      # Then re-deploy talko-app so the build picks up the new value.
      - key: VITE_API_URL
        sync: false
